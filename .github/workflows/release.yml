name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./Snooker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build
        run: mvn clean package

  package:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            type: deb
            artifact: Snooker-linux-deb
          - os: windows-latest
            type: exe
            artifact: Snooker-windows-exe
          - os: macos-latest
            type: dmg
            artifact: Snooker-macos-dmg
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./Snooker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build jar
        run: mvn clean package
